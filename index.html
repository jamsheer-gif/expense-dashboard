<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infolks Outsourcing Expense Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#081225,#0f172a);
  color:#fff;
}

header {
  display:flex;
  align-items:center;
  gap:15px;
  padding:20px;
  font-size:24px;
  font-weight:bold;
}

header img {
  height:50px;
  background:#fff;
  padding:6px;
  border-radius:8px;
}

.wrap {padding:20px}

.controls {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  margin-bottom:15px;
}

select,button {
  padding:8px 12px;
  border-radius:6px;
  border:none;
}

button {
  background:#22c55e;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns: repeat(4,1fr);
  gap:12px;
}

.card {
  background:#1e293b;
  padding:15px;
  border-radius:10px;
}

.big {font-size:24px;font-weight:bold;}

.tablebox {
  margin-top:20px;
  background:#1e293b;
  border-radius:10px;
  overflow:hidden;
}

table {
  width:100%;
  border-collapse:collapse;
}

th,td {
  padding:10px;
  border-bottom:1px solid #334155;
}

th {text-align:left}

.charts {
  margin-top:20px;
  background:#1e293b;
  border-radius:10px;
  padding:10px;
  height:300px; /* FIXED SMALL SIZE */
}

canvas {
  height:260px !important;
}

.footer {
  margin-top:10px;
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<header>
  <img src="logo.png">
  Infolks Outsourcing Expense Dashboard
</header>

<div class="wrap">

<div class="controls">
  <select id="partner"></select>
  <select id="status">
    <option>All Status</option>
    <option>Verified</option>
  </select>

  <select id="service" style="display:none"></select>

  <button id="openSheet">Open Partner Sheet</button>
  <button id="refresh">Refresh</button>
  <button onclick="window.print()">Export PDF</button>
</div>

<div class="grid" id="kpis"></div>

<div class="tablebox">
<table>
<thead>
<tr>
<th>Partner</th>
<th>Month</th>
<th>Invoice</th>
<th>Amount</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>
</div>

<div class="charts">
<canvas id="bar"></canvas>
</div>

<div class="footer">
Confidential internal dashboard • Prepared for management review
</div>

</div>

<script>

const sheets=[
{name:'Webfolks',
 csv:'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9Fl1JcZHBBWLGWVNvHCxu5H2u-eKaT2ROV9_CvUao11L0C63DvsozyhKP6oeQlggpIwrxTW0viVj/pub?gid=1508030208&single=true&output=csv',
 link:'https://docs.google.com/spreadsheets/d/15MT_t8xljl1uwrz8IeQ2R9jACQM8uVBtFuHXdD9xnrM'},

{name:'Medrays',
 csv:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQs_Z1gUwN-Yq33HyYHixzEM3ukiAk45r2PciUIfmtJCK3KkxgugfPbiM6Thp0H9_hsDC1AWMfKPbnw/pub?gid=1508030208&single=true&output=csv',
 link:'https://docs.google.com/spreadsheets/d/1KItTFr7YHFwKu44QMoxdnfHd4a3LzDWO2eL66vkxAx4'},

{name:'Axximum',
 csv:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWKrJExkAA7cGnEl_LV_LuXorPilyiQJyRCbUIfiuNI71aLotZoSxp6JyX3xtdFbQw9ecURLZja8uy/pub?gid=1508030208&single=true&output=csv',
 link:'https://docs.google.com/spreadsheets/d/1891aa7KGYBMfgFrHwz9GodEG-ZDViMExXvOCanTLkVE'}
];

const els={
partner:document.getElementById('partner'),
status:document.getElementById('status'),
service:document.getElementById('service'),
open:document.getElementById('openSheet'),
refresh:document.getElementById('refresh'),
kpis:document.getElementById('kpis'),
tbody:document.getElementById('tbody')
};

let data=[],serviceData={},chart;

function num(x){return parseFloat(String(x).replace(/,/g,''))||0;}
function isMonth(t){return /^[A-Za-z]+ \d{4}$/.test(t);}

async function fetchSheet(s){
 const t=await fetch(s.csv).then(r=>r.text());
 const rows=Papa.parse(t).data;

 const out=[];

 rows.forEach(r=>{
  if(isMonth(r[1]) && num(r[3])>0){
    out.push({
      partner:s.name,
      month:r[1],
      invoice:r[2],
      amount:num(r[3]),
      verified:(r[4]||'').toLowerCase()==='verified'
    });
  }
 });

 // SERVICE PARSE (Webfolks only)
 if(s.name==='Webfolks'){
   const services={};
   let current=null;

   rows.forEach(r=>{
     if(r[13] && !r[14]){
       current=r[13];
       services[current]=[];
     }

     if(current && isMonth(r[14]) && num(r[16])>0){
       services[current].push({
         month:r[14],
         amount:num(r[16])
       });
     }
   });

   serviceData=services;
 }

 return out;
}

async function load(){
 data=(await Promise.all(sheets.map(fetchSheet))).flat();

 els.partner.innerHTML='<option>All Partners</option>'+
 sheets.map(s=>`<option>${s.name}</option>`).join('');

 render();
}

function render(){

 let d=data;

 if(els.partner.value!=='All Partners'){
   d=d.filter(x=>x.partner===els.partner.value);
 }

 if(els.status.value==='Verified'){
   d=d.filter(x=>x.verified);
 }

 // SERVICE FILTER
 if(els.partner.value==='Webfolks'){
   els.service.style.display='inline-block';

   els.service.innerHTML='<option>All Services</option>'+
   Object.keys(serviceData).map(s=>`<option>${s}</option>`).join('');

   if(els.service.value && els.service.value!=='All Services'){
     const svc=serviceData[els.service.value]||[];
     d=svc.map(x=>({
       partner:'Webfolks',
       month:x.month,
       invoice:'-',
       amount:x.amount,
       verified:true
     }));
   }

 } else {
   els.service.style.display='none';
 }

 // KPI
 const total=d.reduce((a,b)=>a+b.amount,0);
 const verified=d.filter(x=>x.verified).length;
 const latest=[...new Set(d.map(x=>x.month))].pop();

 els.kpis.innerHTML=`
 <div class='card'><div>Total</div><div class='big'>₹${total.toLocaleString()}</div></div>
 <div class='card'><div>Verified</div><div class='big'>${verified}</div></div>
 <div class='card'><div>Latest Month</div><div class='big'>${latest||'-'}</div></div>
 <div class='card'><div>Rows</div><div class='big'>${d.length}</div></div>
 `;

 // TABLE
 els.tbody.innerHTML=d.map(r=>`
 <tr>
 <td>${r.partner}</td>
 <td>${r.month}</td>
 <td>${r.invoice}</td>
 <td>₹${r.amount.toLocaleString()}</td>
 <td>${r.verified?'Verified':''}</td>
 </tr>
 `).join('');

 // CHART
 const months=[...new Set(d.map(x=>x.month))];

 const sums=months.map(m=>d.filter(x=>x.month===m).reduce((a,b)=>a+b.amount,0));

 if(chart) chart.destroy();

 chart=new Chart(document.getElementById('bar'),{
  type:'bar',
  data:{labels:months,datasets:[{label:'Amount',data:sums}]}
 });

}

els.partner.onchange=render;
els.status.onchange=render;
els.service.onchange=render;
els.refresh.onclick=load;

els.open.onclick=()=>{
 const s=sheets.find(x=>x.name===els.partner.value);
 if(s) window.open(s.link,'_blank');
};

load();

</script>

</body>
</html>

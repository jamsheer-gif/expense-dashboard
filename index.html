<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Expense Dashboard Upgraded</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#081225;color:#fff}header{padding:20px;font-size:28px;font-weight:700}.wrap{padding:20px}.controls{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:15px}select,button{padding:10px;border:none;border-radius:10px}button{background:#22c55e;font-weight:700;cursor:pointer}.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px}.card{background:#1e293b;padding:16px;border-radius:16px}.label{font-size:12px;color:#94a3b8}.value{font-size:32px;font-weight:700;margin-top:6px}.charts{display:grid;grid-template-columns:2fr 1fr;gap:14px;margin-top:14px}canvas{background:#1e293b;border-radius:16px;padding:10px;min-height:320px}.tablebox{margin-top:14px;background:#1e293b;border-radius:16px;overflow:auto}table{width:100%;border-collapse:collapse}th,td{padding:10px;border-bottom:1px solid #334155;text-align:left}th{background:#111827}.muted{color:#94a3b8;font-size:12px;margin-top:6px}@media(max-width:900px){.charts{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>Live Outsourcing Expense Dashboard</header>
<div class='wrap'>
<div class='controls'>
<select id='partner'></select>
<select id='status'><option>All Status</option><option>Verified</option><option>Pending</option></select>
<button id='refresh'>Refresh</button>
<button id='auto'>Auto Refresh: Off</button>
</div>
<div class='grid' id='kpis'></div>
<div class='charts'><canvas id='lineChart'></canvas><canvas id='pieChart'></canvas></div>
<div class='tablebox'><table><thead><tr><th>Partner</th><th>Month</th><th>Invoice</th><th>Amount</th><th>Status</th></tr></thead><tbody id='tbody'></tbody></table></div>
<div class='muted' id='foot'></div>
</div>
<script>
const partnerEl=document.getElementById('partner'),statusEl=document.getElementById('status'),refreshEl=document.getElementById('refresh'),autoEl=document.getElementById('auto'),kpisEl=document.getElementById('kpis'),tbodyEl=document.getElementById('tbody'),footEl=document.getElementById('foot');
const lineCtx=document.getElementById('lineChart'); const pieCtx=document.getElementById('pieChart');
const sheets=[{name:'Webfolks',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9Fl1JcZHBBWLGWVNvHCxu5H2u-eKaT2ROV9_CvUao11L0C63DvsozyhKP6oeQlggpIwrxTW0viVj/pub?gid=1508030208&single=true&output=csv'},{name:'Medrays',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vQs_Z1gUwN-Yq33HyYHixzEM3ukiAk45r2PciUIfmtJCK3KkxgugfPbiM6Thp0H9_hsDC1AWMfKPbnw/pub?gid=1508030208&single=true&output=csv'},{name:'Axximum',url:'https://docs.google.com/spreadsheets/d/e/2PACX-1vTWKrJExkAA7cGnEl_LV_LuXorPilyiQJyRCbUIfiuNI71aLotZoSxp6JyX3xtdFbQw9ecURLZja8uy/pub?gid=1508030208&single=true&output=csv'}];
let allData=[],lineChart,pieChart,timer=null;
const colors=['#38bdf8','#22c55e','#f59e0b'];
function money(v){return '₹'+Number(v).toLocaleString('en-IN',{maximumFractionDigits:2});}
function num(v){return parseFloat(String(v||0).replace(/,/g,''))||0;}
function isMonth(v){return /^(january|february|march|april|may|june|july|august|september|october|november|december)/i.test(String(v||'').trim());}
async function fetchSheet(sheet){const txt=await fetch(sheet.url).then(r=>r.text());const rows=Papa.parse(txt).data;return rows.map(r=>({partner:sheet.name,month:String(r[1]||'').trim(),invoice:String(r[2]||'').trim(),amount:num(r[3]),verified:String(r[4]||'').trim().toLowerCase()==='verified'})).filter(x=>isMonth(x.month)&&x.amount>0);}
async function load(){kpisEl.innerHTML='<div class="card">Loading...</div>';allData=(await Promise.all(sheets.map(fetchSheet))).flat();partnerEl.innerHTML='<option>All Partners</option>'+sheets.map(s=>'<option>'+s.name+'</option>').join('');render();footEl.textContent='Last updated: '+new Date().toLocaleString();}
function filtered(){const p=partnerEl.value,s=statusEl.value;return allData.filter(r=>(p==='All Partners'||r.partner===p)&&(s==='All Status'||(s==='Verified'?r.verified:!r.verified)));}
function render(){const d=filtered();const total=d.reduce((a,b)=>a+b.amount,0),verified=d.filter(x=>x.verified).length;const months=[...new Set(d.map(x=>x.month))];const latest=months[months.length-1]||'-';const latestTotal=d.filter(x=>x.month===latest).reduce((a,b)=>a+b.amount,0);kpisEl.innerHTML='<div class="card"><div class="label">TOTAL INVOICED</div><div class="value">'+money(total)+'</div></div><div class="card"><div class="label">VERIFIED COUNT</div><div class="value">'+verified+'</div></div><div class="card"><div class="label">LATEST MONTH</div><div class="value">'+latest+'</div></div><div class="card"><div class="label">LATEST TOTAL</div><div class="value">'+money(latestTotal)+'</div></div>';tbodyEl.innerHTML=d.map(r=>'<tr><td>'+r.partner+'</td><td>'+r.month+'</td><td>'+r.invoice+'</td><td>'+money(r.amount)+'</td><td>'+(r.verified?'Verified':'Pending')+'</td></tr>').join('');drawCharts(d,months);}
function drawCharts(d,months){const datasets=sheets.map((s,i)=>({label:s.name,data:months.map(m=>d.filter(x=>x.partner===s.name&&x.month===m).reduce((a,b)=>a+b.amount,0)),borderColor:colors[i],backgroundColor:colors[i],tension:.3}));if(lineChart)lineChart.destroy();lineChart=new Chart(lineCtx,{type:'line',data:{labels:months,datasets},options:{plugins:{legend:{labels:{color:'#fff'}}},scales:{x:{ticks:{color:'#fff'}},y:{ticks:{color:'#fff'}}}}});const totals=sheets.map(s=>d.filter(x=>x.partner===s.name).reduce((a,b)=>a+b.amount,0));if(pieChart)pieChart.destroy();pieChart=new Chart(pieCtx,{type:'doughnut',data:{labels:sheets.map(s=>s.name),datasets:[{data:totals,backgroundColor:colors}]},options:{plugins:{legend:{labels:{color:'#fff'}}}}});}
partnerEl.onchange=render;statusEl.onchange=render;refreshEl.onclick=load;autoEl.onclick=()=>{if(timer){clearInterval(timer);timer=null;autoEl.textContent='Auto Refresh: Off';}else{timer=setInterval(load,60000);autoEl.textContent='Auto Refresh: On';}};load();
</script>
</body></html>

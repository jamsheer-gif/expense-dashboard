<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Expense Debug Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<style>
body{font-family:Arial,sans-serif;margin:0;padding:20px;background:#0b1220;color:#fff}button{padding:10px 14px;border:none;border-radius:8px;background:#22c55e;font-weight:700;cursor:pointer}pre{background:#111827;padding:14px;border-radius:12px;overflow:auto;white-space:pre-wrap}table{width:100%;border-collapse:collapse;margin-top:16px}th,td{border:1px solid #334155;padding:8px;text-align:left}th{background:#1e293b}
</style>
</head>
<body>
<h1>Expense Dashboard Debug</h1>
<p>This page fetches one sheet and shows raw parsed rows.</p>
<button onclick="load()">Load Debug Data</button>
<h2>Status</h2>
<div id="status">Waiting...</div>
<h2>Raw CSV Preview</h2>
<pre id="raw"></pre>
<h2>Parsed Rows</h2>
<table>
<thead><tr><th>#</th><th>Col A</th><th>Col B</th><th>Col C</th><th>Col D</th><th>Col E</th><th>Col F</th></tr></thead>
<tbody id="tbody"></tbody>
</table>
<script>
const url='https://docs.google.com/spreadsheets/d/e/2PACX-1vSK9Fl1JcZHBBWLGWVNvHCxu5H2u-eKaT2ROV9_CvUao11L0C63DvsozyhKP6oeQlggpIwrxTW0viVj/pub?gid=1508030208&single=true&output=csv';
async function load(){try{status.textContent='Fetching...';const txt=await fetch(url).then(r=>r.text());raw.textContent=txt.substring(0,3000);const rows=Papa.parse(txt).data;status.textContent='Loaded '+rows.length+' rows';tbody.innerHTML=rows.slice(0,25).map((r,i)=>'<tr><td>'+i+'</td><td>'+(r[0]||'')+'</td><td>'+(r[1]||'')+'</td><td>'+(r[2]||'')+'</td><td>'+(r[3]||'')+'</td><td>'+(r[4]||'')+'</td><td>'+(r[5]||'')+'</td></tr>').join('');}catch(e){status.textContent='ERROR: '+e.message;}}
</script>
</body>
</html>
